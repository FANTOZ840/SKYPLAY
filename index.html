<!DOCTYPE html>
<html>
<head>
    <title>SkyCrashHub</title>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#0f172a; font-family:Arial, sans-serif; color:#fff; }
        .sky { position: fixed; width: 200%; height: 100%; background: linear-gradient(to top,#0f172a,#1e3a8a); animation: moveSky 20s linear infinite; z-index:-2;}
        @keyframes moveSky { 0%{background-position:0 0;} 100%{background-position:-100% 0;} }
        #multiplier { font-size:48px; font-weight:bold; color:#00ffcc; text-align:center; margin-top:20px; text-shadow:0 0 10px #00ffcc; }
        #plane { position:absolute; top:300px; left:50%; width:60px; transition:top 0.2s; z-index:2; }
        .star { position:absolute; width:5px; height:5px; background:yellow; border-radius:50%; animation:fall 2s linear infinite; opacity:0.8; }
        @keyframes fall {0%{transform:translateY(0) translateX(0); opacity:1;} 100%{transform:translateY(300px) translateX(-50px); opacity:0;}}
    </style>
</head>
<body>
    <!-- Audio files (upload fly.mp3 and crash.mp3 to the same folder) -->
    <audio id="flySound" src="fly.mp3" loop></audio>
    <audio id="crashSound" src="crash.mp3"></audio>

    <div class="sky"></div>
    <h1 style="text-align:center;">SkyCrashHub</h1>
    <div id="multiplier">0.00x</div>
    <img id="plane" src="https://i.postimg.cc/Zn5fG8P3/plane.png">

    <script>
        const plane = document.getElementById('plane');
        const multiplierDisplay = document.getElementById('multiplier');
        const flySound = document.getElementById('flySound');
        const crashSound = document.getElementById('crashSound');

        // Create random stars behind the plane
        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random()*window.innerWidth+'px';
            star.style.top = Math.random()*window.innerHeight/2+'px';
            document.body.appendChild(star);
            setTimeout(()=>star.remove(),2000);
        }

        function startRound() {
            let multiplier = 0.00;
            plane.style.top = '300px';
            plane.style.display = 'block';

            // Start flying sound
            flySound.currentTime = 0;
            flySound.play();

            // Random crash multiplier between 2.00 and 30.00
            const crashMultiplier = (Math.random()*28 + 2).toFixed(2);

            const interval = setInterval(()=>{
                // Small random increment per step
                const increment = Math.random()*0.3;
                multiplier = parseFloat((multiplier + increment).toFixed(2));

                multiplierDisplay.innerText = multiplier + 'x';

                // Plane moves up with multiplier
                let newTop = 300 - multiplier*6;
                plane.style.top = newTop + 'px';

                // Random stars
                if(Math.random() < 0.3) createStar();

                // Check crash
                if(multiplier >= crashMultiplier){
                    clearInterval(interval);
                    plane.style.display = 'none';

                    // Stop flying sound and play crash
                    flySound.pause();
                    crashSound.currentTime = 0;
                    crashSound.play();

                    // Start next round automatically after 1.5 seconds
                    setTimeout(startRound, 1500);
                }
            }, 500); // controls speed of multiplier increase
        }

        // Start automatically on page load
        window.onload = startRound;
    </script>
</body>
</html>
