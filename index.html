<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SkyCrash - Bets</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#8b0000;
  color:white;
  text-align:center;
}

/* HISTORY TOP */
#history{
  display:flex;
  justify-content:flex-start;
  overflow-x:auto;
  padding:10px;
  gap:8px;
  background:#330000;
}
.history-item{
  padding:5px 12px;
  border-radius:10px;
  font-weight:bold;
  font-size:14px;
  white-space:nowrap;
}

/* MULTIPLIER */
#multiplier{
  font-size:80px;
  margin-top:60px;
  color:#ff4d4d;
}

/* BET BUTTONS */
#controls{
  margin-top:30px;
}
button{
  padding:12px 20px;
  font-size:18px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.bet-btn{ background:#00aa00; color:white; }
.cash-btn{ background:#ffaa00; color:black; }

</style>
</head>
<body>

<div id="history"></div>

<div id="multiplier">0.00x</div>
<div id="status">Starting...</div>

<!-- BET BUTTONS -->
<div id="controls">
  <button class="bet-btn" onclick="placeBet(100)">BET 100</button>
  <button class="bet-btn" onclick="placeBet(500)">BET 500</button>
  <button id="cashBtn" class="cash-btn" onclick="cashOut()" style="display:none;">CASH OUT</button>
</div>

<script>
let multiplier = 0;
let crashPoint = 0;
let interval;
let historyList = [];
let currentBet = 0;
let cashedOut = false;

// UPDATE HISTORY
function updateHistory(value){
  historyList.unshift(value);
  if(historyList.length>10) historyList.pop();
  const historyDiv=document.getElementById("history");
  historyDiv.innerHTML="";
  historyList.forEach(num=>{
    const item=document.createElement("div");
    item.classList.add("history-item");
    if(num<2) item.style.background="#cc0000";
    else if(num<10) item.style.background="#ff9900";
    else item.style.background="#00cc66";
    item.innerText=num.toFixed(2)+"x";
    historyDiv.appendChild(item);
  });
}

// PLACE BET
function placeBet(amount){
  currentBet = amount;
  cashedOut=false;
  document.getElementById("cashBtn").style.display="inline-block";
  document.getElementById("status").innerText="Bet placed: "+amount;
}

// CASH OUT
function cashOut(){
  if(currentBet>0 && !cashedOut){
    cashedOut=true;
    let win = currentBet*multiplier;
    document.getElementById("status").innerText="You won: "+win.toFixed(2);
    document.getElementById("cashBtn").style.display="none";
    currentBet=0;
  }
}

// START ROUND
function startRound(){
  multiplier=0;
  crashPoint=Math.random()*28+2;
  currentBet=0;
  cashedOut=false;
  document.getElementById("cashBtn").style.display="none";
  document.getElementById("status").innerText="Flying...";

  clearInterval(interval);

  interval=setInterval(()=>{
    multiplier+=0.2+Math.random()*0.3;
    if(multiplier>30) multiplier=30;
    document.getElementById("multiplier").innerText=multiplier.toFixed(2)+"x";

    if(multiplier>=crashPoint){
      clearInterval(interval);
      document.getElementById("multiplier").innerText=crashPoint.toFixed(2)+"x";
      if(currentBet>0 && !cashedOut){
        document.getElementById("status").innerText="You Lost!";
      } else{
        document.getElementById("status").innerText="CRASHED";
      }
      updateHistory(crashPoint);

      setTimeout(()=>{
        document.getElementById("status").innerText="Waiting for next round...";
        setTimeout(startRound,2000);
      },1500);
    }

  },80);
}

startRound();
</script>

</body>
</html>
