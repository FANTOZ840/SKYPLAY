<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SkyCrashPlay Test</title>
<style>
body{background:black;color:white;font-family:Arial;text-align:center;padding:20px;}
#multiplier{font-size:50px;color:red;margin:20px;}
#status{margin-bottom:20px;}
#history{display:flex;justify-content:center;gap:10px;margin-bottom:20px;}
#history div{background:#222;padding:5px 10px;border-radius:5px;}
</style>
</head>
<body>

<h1>SkyCrashPlay Test</h1>
<div id="status">Connecting...</div>
<div id="multiplier">0.00x</div>
<div id="history"></div>

<div>
<input type="number" id="bet1" value="100">
<button onclick="placeBet(1)">BET</button>
<button onclick="cashOut(1)">CASH OUT</button>
<span id="result1"></span>
</div>

<script>
// Variables
let multiplier = 0;
let crashPoint = 0;
let interval;
let historyList = [];
let activeBets = {1:{placed:false,amount:100,cashed:false}};

// Functions
function placeBet(box){
    let amt = parseInt(document.getElementById("bet"+box).value);
    activeBets[box].placed=true;
    activeBets[box].amount=amt;
    activeBets[box].cashed=false;
    document.getElementById("result"+box).innerText="Bet placed: Sh."+amt;
}

function cashOut(box){
    let bet = activeBets[box];
    if(bet.placed && !bet.cashed){
        bet.cashed=true;
        let win=(bet.amount*multiplier).toFixed(2);
        document.getElementById("result"+box).innerText="Cashed Out at "+multiplier.toFixed(2)+"x = Sh."+win;
    }
}

function updateHistory(){
    let container=document.getElementById("history");
    container.innerHTML="";
    for(let i=0;i<historyList.length;i++){
        let div=document.createElement("div");
        div.innerText=historyList[i]+"x";
        container.appendChild(div);
    }
}

function startRound(){
    multiplier=0;
    crashPoint=parseFloat((Math.random()*5+2).toFixed(2));
    document.getElementById("status").innerText="Flying...";
    interval=setInterval(function(){
        multiplier+=0.1;
        multiplier=parseFloat(multiplier.toFixed(2));
        document.getElementById("multiplier").innerText=multiplier+"x";

        if(activeBets[1].placed && !activeBets[1].cashed && multiplier>=crashPoint){
            activeBets[1].cashed=true;
            document.getElementById("result1").innerText="Crashed at "+crashPoint+"x, Lost Sh."+activeBets[1].amount;
        }

        if(multiplier>=crashPoint){
            clearInterval(interval);
            historyList.unshift(crashPoint.toFixed(2));
            if(historyList.length>5) historyList.pop();
            updateHistory();
            setTimeout(startRound,2000);
        }
    },100);
}

// Start game
setTimeout(startRound,500);
</script>

</body>
</html>
