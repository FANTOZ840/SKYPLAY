<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyCrashPlay - Multiplier with Players</title>
<style>
body{margin:0;padding:20px;font-family:Arial;background:black;color:white;display:flex;flex-direction:column;}
header{text-align:center;font-size:36px;color:#ff4d4d;margin-bottom:20px;}
#multiplier{font-size:50px;color:red;text-align:center;margin-bottom:10px;}
#status{text-align:center;margin-bottom:20px;font-size:18px;}
.history{display:flex;overflow-x:auto;padding:10px;background:#1a0000;margin-bottom:10px;}
.history div{background:#330000;padding:6px 12px;margin-right:6px;border-radius:20px;font-size:16px;color:#ff4d4d;flex-shrink:0;}
.players{max-width:600px;margin:0 auto;flex:1;}
.player{background:#330000;padding:10px;margin-bottom:6px;border-radius:8px;font-size:18px;display:flex;justify-content:space-between;}
</style>
</head>
<body>

<header>SkyCrashPlay</header>

<div class="history" id="history"></div>

<div id="status">Connecting to game...</div>
<div id="multiplier">0.00x</div>

<div class="players" id="players"></div>

<script>
// -----------------------
// Players
const playersList=["John","Jane","Odhiambo","Kelvin","Janet","Wairimu","Joyce","Faith","Njeri","Kanja","Douglas"];
let simulatedPlayers=[];

// -----------------------
// History
let historyList=[];

// -----------------------
// Multiplier
let multiplier=0;
let crashPoint=0;
let interval=null;

// -----------------------
// Generate players with random cash out
function generatePlayers(){
    simulatedPlayers=[];
    let html="";
    for(let i=0;i<playersList.length;i++){
        let betAmount=[50,100,150,200][Math.floor(Math.random()*4)];
        let cashOut=parseFloat((Math.random()*6+1.5).toFixed(2));
        simulatedPlayers.push({name:playersList[i],bet:betAmount,cashOut:cashOut,cashed:false});
        html+=<div class="player" id="player${i}">${playersList[i]} - Bet Sh.${betAmount} - Cash Out: ${cashOut}x</div>;
    }
    document.getElementById("players").innerHTML=html;
}

// -----------------------
// Update history (top odds)
function updateHistory(currentMultiplier){
    const container=document.getElementById("history");
    container.innerHTML="";
    // show current multiplier first
    let currentDiv=document.createElement("div");
    currentDiv.innerText=currentMultiplier.toFixed(2)+"x";
    container.appendChild(currentDiv);
    // show previous crash multipliers
    for(let i=0;i<historyList.length;i++){
        let div=document.createElement("div");
        div.innerText=historyList[i]+"x";
        container.appendChild(div);
    }
}

// -----------------------
// Start a new round
function startRound(){
    multiplier=0;
    crashPoint=parseFloat((Math.random()*10+2).toFixed(2)); // crash multiplier between 2 and 12
    document.getElementById("status").innerText="Flying...";
    generatePlayers();

    if(interval) clearInterval(interval);

    interval=setInterval(function(){
        multiplier+=0.1;
        multiplier=parseFloat(multiplier.toFixed(2));
        document.getElementById("multiplier").innerText=multiplier.toFixed(2)+"x";

        // update history to show running multiplier
        updateHistory(multiplier);

        // Players automatic cash out
        simulatedPlayers.forEach((p,i)=>{
            if(!p.cashed && multiplier>=p.cashOut && multiplier<crashPoint){
                p.cashed=true;
                document.getElementById("player"+i).innerText=${p.name} - Bet Sh.${p.bet} - Cashed Out ${p.cashOut}x = Sh.${(p.bet*p.cashOut).toFixed(2)};
            }
            if(!p.cashed && multiplier>=crashPoint){
                p.cashed=true;
                document.getElementById("player"+i).innerText=${p.name} - Bet Sh.${p.bet} - Crashed at ${crashPoint}x, Lost Sh.${p.bet};
            }
        });

        // End round
        if(multiplier>=crashPoint){
            clearInterval(interval);
            // save crash multiplier to history
            historyList.unshift(crashPoint.toFixed(2));
            if(historyList.length>10) historyList.pop();
            // start new round after 2 seconds
            setTimeout(startRound,2000);
        }

    },80);
}

// -----------------------
// Start game after page load
window.onload = function(){
    startRound();
};
</script>

</body>
</html>
