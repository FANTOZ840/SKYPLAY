<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator Multiplayer Simulator</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    color:white;
    background:
        radial-gradient(circle at center, #400000 0%, #000 70%),
        repeating-radial-gradient(circle, rgba(0,0,0,0.6) 0px, rgba(0,0,0,0.6) 10px, transparent 10px, transparent 20px);
}

/* History top */
.history{
    display:flex;
    overflow-x:auto;
    padding:10px;
    background:#1a0000;
}
.history div{
    background:#330000;
    padding:6px 12px;
    margin-right:6px;
    border-radius:20px;
    font-size:14px;
    color:#ff4d4d;
}

/* Game area */
.game-area{
    height:40vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
}

#multiplier{
    font-size:55px;
    font-weight:bold;
    color:#ff4d4d;
}

#status{
    margin-bottom:10px;
    opacity:0.8;
}

/* Betting panel */
.bet-panel{
    background:#1a0000;
    padding:15px;
}

.bet-controls{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
}

input{
    width:80px;
    text-align:center;
    font-size:16px;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:5px;
    background:#ff0000;
    color:white;
    cursor:pointer;
}

/* Player result list */
.players{
    margin-top:15px;
    max-height:200px;
    overflow-y:auto;
}

.player{
    background:#330000;
    padding:6px;
    margin-bottom:5px;
    border-radius:5px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="history" id="history"></div>

<div class="game-area">
    <div id="status">Connecting to game...</div>
    <div id="multiplier">0.00x</div>
</div>

<div class="bet-panel">

    <div class="bet-controls">
        <button onclick="changeBet(-50)">-</button>
        <input type="number" id="betAmount" value="100">
        <button onclick="changeBet(50)">+</button>
        <button onclick="placeBet()">BET</button>
    </div>

    <div>
        Auto Cash Out:
        <input type="number" id="autoCash" value="2.00" step="0.1">
    </div>

    <div class="players" id="players"></div>

</div>

<script>

let players = [
"Joyce","Ephantus","John","Mercy","Alex",
"Loice","Jacinta","Joy","Mwenye","Jackline",
"David","Daniel","Odhiambo"
];

let multiplier = 0;
let crashPoint = 0;
let interval;
let historyList = [];
let playerData = [];

function changeBet(amount){
    let input = document.getElementById("betAmount");
    input.value = Math.max(50, parseInt(input.value) + amount);
}

function placeBet(){
    alert("Your bet placed!");
}

function generatePlayers(){
    playerData = [];
    for(let i=0;i<players.length;i++){
        let betOptions = [100,150,500,1000,200,300];
        let bet = betOptions[Math.floor(Math.random()*betOptions.length)];
        let cashOut = parseFloat((Math.random()*4+1.5).toFixed(2));
        playerData.push({
            name: players[i],
            bet: bet,
            cashOut: cashOut,
            cashed:false
        });
    }
}

function startRound(){
    document.getElementById("players").innerHTML="";
    document.getElementById("status").innerText="Flying...";

    multiplier = 0;
    crashPoint = parseFloat((Math.random()*6+2).toFixed(2));

    generatePlayers();

    interval = setInterval(function(){

        multiplier += 0.05;
        multiplier = parseFloat(multiplier.toFixed(2));
        document.getElementById("multiplier").innerText = multiplier + "x";

        for(let i=0;i<playerData.length;i++){
            let p = playerData[i];

            if(!p.cashed && multiplier >= p.cashOut && multiplier < crashPoint){
                p.cashed = true;
                let win = (p.bet * p.cashOut).toFixed(2);

                let div = document.createElement("div");
                div.className="player";
                div.innerText = p.name+" bet "+p.bet+" → Cashed out at "+p.cashOut+"x = Sh."+win;
                document.getElementById("players").appendChild(div);
            }
        }

        if(multiplier >= crashPoint){
            clearInterval(interval);
            document.getElementById("status").innerText="Crashed at "+crashPoint+"x";

            historyList.unshift(crashPoint+"x");
            if(historyList.length>10) historyList.pop();
            updateHistory();

            setTimeout(function(){
                document.getElementById("status").innerText="Connecting to game...";
                setTimeout(startRound,2000);
            },2500);
        }

    },100);
}

function updateHistory(){
    let container = document.getElementById("history");
    container.innerHTML="";
    for(let i=0;i<historyList.length;i++){
        let div=document.createElement("div");
        div.innerText=historyList[i];
        container.appendChild(div);
    }
}

setTimeout(startRound,2000);

</script>

</body>
</html>
